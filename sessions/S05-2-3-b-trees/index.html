<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 343 · L05 — Balanced Trees II: 2-3, B &amp; B+ Trees</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="viz/viz.css">
  <link rel="stylesheet" href="../../lib/core/lib.css">

  <style>
    :root { --accent: #7c5cff; }
    .reveal h2 { color: #2a2a3a; }
    .reveal h3 { color: var(--accent); }
    .reveal section small { color: #66708a; }
    .reveal table { font-size: 0.78em; }
    .reveal pre { width: 100%; box-shadow: none; font-size: 0.46em; }
    .reveal pre code { border-radius: 8px; }
    .reveal img { background: #fff; border: 1px solid #eef0f4; border-radius: 8px; }
    .reveal blockquote { width: 92%; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="L05-2-3-b-trees.md"
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Presenter companion: press N for a synced notes tab (see lib/presenter.js) -->
  <script src="../../lib/presenter.js"></script>
  <!-- Grid review: press G for a zoomable, linearized grid of all slides -->
  <script src="../../lib/grid-review.js"></script>

  <!-- Unified library — lecture demos via the bridge. Each spec here gets an
       editable "initial" build sequence (Build animates it key by key) plus
       an editable-key Insert, via lib/core/full-demo.js's mini chrome. -->
  <script type="module">
    import { initDeckDemos, TwoThree, RedBlack, MultiwayTreeRenderer, TreeRenderer } from "../../lib/deck.js";
    initDeckDemos({
      "tt-insert": {
        make: () => new TwoThree(),
        // "start..stop:step:order" — edit freely; Build animates it key by key
        initial: "1..40:1:ZIG",
        renderer: (c) => new MultiwayTreeRenderer(c),
        buildStep: (s, k) => s.insert(k),
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
          { name: "Delete", arg: "number", run: (s, v) => s.delete(v) },
        ],
        costs: ["compare", "write", "alloc"], chrome: { showCosts: true },
        width: 900, height: 230,
      },
      "btree-insert": {
        // the GALLERY spec (demos/registry.js) + slide-local overrides — one
        // source of truth instead of a hand-clone. spec-config merge: ops by
        // name, inputs by key, enabled:false removes. The M box (and its
        // remake) ride in from the base — M = 3 shows "a 2-3 tree IS a
        // B-tree of order 3" live.
        use: "btree",
        initial: "1..40:1:ZAG",
        inputs: [{ key: "m", width: 50 }],
        ops: [{ name: "Search", enabled: false }], // slide focuses insert/delete
        chrome: { showCosts: true },
        width: 900, height: 230,
      },
      "rb-insert": {
        make: () => new RedBlack(),
        initial: "1..24:1:RAND",
        renderer: (c) => new TreeRenderer(c, { labels: "none" }),
        buildStep: (s, k) => s.insert(k),
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
          { name: "Delete", arg: "number", run: (s, v) => s.delete(v) },
        ],
        costs: ["compare", "rotation", "link"], chrome: { showCosts: true },
        width: 900, height: 250,
      },
    });
  </script>
</body>
</html>
