<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 343 · L06 — Heaps &amp; Priority Queues; Heapsort</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="viz/viz.css">
  <link rel="stylesheet" href="../../lib/core/lib.css">

  <style>
    :root { --accent: #7c5cff; }
    .reveal h2 { color: #2a2a3a; }
    .reveal h3 { color: var(--accent); }
    .reveal section small { color: #66708a; }
    .reveal table { font-size: 0.78em; }
    .reveal pre { width: 100%; box-shadow: none; font-size: 0.46em; }
    .reveal pre code { border-radius: 8px; }
    .reveal img { background: #fff; border: 1px solid #eef0f4; border-radius: 8px; }
    .reveal blockquote { width: 92%; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="L06-heaps-pq.md"
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Presenter companion: press N for a synced notes tab (see lib/presenter.js) -->
  <script src="../../lib/presenter.js"></script>

  <!-- Unified library — heap lecture demos via the bridge. ONE engine (MaxHeap +
       synced array/tree views); each slide's spec exposes only the operations
       the lecture has introduced by that point:
         heap-insert  (Part 4)  Insert only — swim
         heap-ops     (Part 5)  Insert + Delete Max — the live PQ
         heap-heapify (Part 6)  raw array + Heapify only
         heap-sort    (Part 8)  Heapify / Sort Down / Heapsort -->
  <script type="module">
    import { initDeckDemos, MaxHeap, ArrayRenderer, HeapTreeRenderer } from "../../lib/deck.js";
    const dualRenderer = () => [
      (c) => new ArrayRenderer(c, { mode: "cells" }),
      (c) => new HeapTreeRenderer(c),
    ];
    initDeckDemos({
      "heap-insert": {
        title: "heap",
        make: () => new MaxHeap(),
        // the deck's your-turn heap — predict where 85 lands, then Insert 85 here
        initial: "90,80,70,30,60,50",
        renderer: dualRenderer(),
        buildStep: (s, k) => s.insert(k),
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
        ],
        costs: ["compare", "swap"], chrome: { showCosts: true },
        width: 1000, height: [75, 130],
      },
      "heap-ops": {
        title: "heap",
        make: () => new MaxHeap(),
        initial: "1..24:1:ZIG",
        renderer: dualRenderer(),
        buildStep: (s, k) => s.insert(k),
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
          { name: "Delete Max", run: (s) => s.delMax() },
        ],
        costs: ["compare", "swap"], chrome: { showCosts: true },
        width: 1000, height: [75, 130],
      },
      "heap-heapify": {
        title: "heap",
        make: () => new MaxHeap(),
        initial: "1..36:1:RAND",
        renderer: dualRenderer(),
        loadRaw: true,
        stateMsg: () => "raw array — press Heapify",
        ops: [
          { name: "Heapify", run: (s) => s.heapify() },
        ],
        costs: ["compare", "swap"], chrome: { showCosts: true },
        width: 1000, height: [75, 130],
      },
      "heap-sort": {
        title: "heap",
        make: () => new MaxHeap(),
        initial: "1..16:1:RAND",
        renderer: dualRenderer(),
        loadRaw: true,
        stateMsg: () => "raw array — press Heapify, then Sort Down (or Heapsort for both at once)",
        ops: [
          { name: "Heapify", run: (s) => s.heapify(), setsFlag: "heapified" },
          { name: "Sort Down", run: (s) => s.sinkDown(), requiresFlag: "heapified", clearsFlag: "heapified" },
          { name: "Heapsort", run: (s) => s.heapsort(), clearsFlag: "heapified" },
        ],
        costs: ["compare", "swap"], chrome: { showCosts: true },
        width: 1000, height: [75, 130],
      },
    });
  </script>
</body>
</html>
