    });
  </script>

  <!-- Unified library — heap lecture demos (swim / sink / heapify / heapsort) via the bridge. -->
  <script type="module">
    import { initDeckDemos, MaxHeap, ArrayRenderer } from "../../lib/deck.js";
    const RAW = [30, 60, 50, 90, 85, 40, 70, 45, 20, 95, 10, 15];
    const heapView = () => ({
      make: () => new MaxHeap(), renderer: (c) => new ArrayRenderer(c, { mode: "cells" }),
      chrome: { showCosts: true }, width: 860, height: 200,
    });
    initDeckDemos({
      "heap-swim":  { ...heapView(), run: (s) => s.insert(95), costs: ["compare", "swap"] },          // builds from data-example, then swims 95 up
      "heap-sink":  { ...heapView(), run: (s) => s.delMax(), costs: ["compare", "swap"] },             // build a heap, then delMax sinks
      "heap-build": { ...heapView(), run: (s) => s.heapify(RAW), costs: ["compare", "swap"], height: 230 },  // raw array → bottom-up heapify (Θ(n))
      "heap-sort":  { ...heapView(), run: (s) => s.heapsort(RAW), costs: ["compare", "swap"], height: 230 }, // heapify + sort down, in place
    });
  </script>
