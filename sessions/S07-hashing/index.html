<body>
  <div class="reveal">

      <section
        data-markdown="L07-hashing.md"

        data-separator-vertical="^\r?\n--\r?\n$"

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>

  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Presenter companion: press N for a synced notes tab (see lib/presenter.js) -->
  <script src="../../lib/presenter.js"></script>
  <!-- Grid review: press G for a zoomable, linearized grid of all slides -->
  <script src="../../lib/grid-review.js"></script>
  <!-- Unified library — hashing lecture demos via the bridge. ONE engine per
       scheme; each slide's spec exposes only the operations the lecture has
       introduced by that point:
         hash-chain        (Part 3)  separate chaining — Insert/Search/Delete on
                                     the ChainRenderer; a second slot floods it
                                     (data-example="1..70") to break the O(1) story
         hash-chain-resize (Part 3)  chaining WITH resize (α = 1 doubles) — the fix
         hash-probe        (Part 4)  linear probing — Insert/Search, FIXED size
                                     (resizeAt: Infinity; a full table refuses keys)
         hash-delete       (Part 4)  linear probing — adds Delete (Sedgewick's
                                     cluster re-insert), still fixed size
         hash-delete-race  (Part 4)  chaining unlink vs probing TOMBSTONES,
                                     scripted deletes/searches side by side
         probe-delete-pitfalls (P4)  blank/shift/swap shortcut deletes, each
                                     ending on the search it breaks
         probe-race        (Part 5)  linear vs quadratic vs double on one
                                     all-collide stream
         hash-resize       (Part 6)  linear probing — Insert with the 0.5 threshold
                                     live: cross it and watch the double + rehash
       plus a STATIC state-stack (#double-worked) for the double-hashing
       worked example — every insert's table state, stacked. -->
  <script type="module">
    import { initDeckDemos, LinearProbing, OpenAddressing, SeparateChaining, ArrayRenderer, ChainRenderer, chainingInfo, openAddressingInfo, renderStateStack } from "../../lib/deck.js";
    const arr = (c) => new ArrayRenderer(c, { mode: "cells" });
    const probeCosts = ["hash", "compare", "write"];
    initDeckDemos({
      // the odd numbers 1..21 into M=7: step 2 is coprime to 7, so the keys
      // cycle through every bucket, then wrap and pair up — four 2-chains,
      // three 1-chains, α = 11/7 (matches the your-turn slide's table).
      // The flood slide reuses this spec with data-example="1..70".
      "hash-chain": {
        title: "chaining table (M = 7)",
        make: () => new SeparateChaining(7),
        initial: "1..21:2",
        buildStep: (s, k) => s.insert(k),
        renderer: (c) => new ChainRenderer(c),
        stateMsg: (s) => {
          const longest = Math.max(0, ...s.buckets.map((b) => b.length));
          return `M = ${s.M}, n = ${s.n} — α = ${s.alpha()}, longest chain ${longest}`;
        },
        scripts: [{ name: "prove the α cost: search deep keys", text: "search 63\nsearch 70" }],
        info: chainingInfo("M is FIXED — no resize"),
        ops: [
          { name: "Insert", arg: "number", desc: "hash to the bucket, scan for a duplicate, link at the chain's end", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", desc: "walk ONLY the home bucket's chain", run: (s, v) => s.search(v) },
          { name: "Delete", arg: "number", desc: "walk the chain, unlink the node — nothing else moves", run: (s, v) => s.remove(v) },
        ],
        costs: ["hash", "compare"], chrome: { showCosts: true },
        width: 1000, height: 240,
      },
      // Part 3 resolution: the SAME chaining table with the fix turned on —
      // α reaching 1 doubles M and rehashes; the flood preset shows chains
      // shortening mid-build
      "hash-chain-resize": { use: "hash-chain-resize", width: 1000, chrome: { showCosts: true } },
      // Part 4: the delete story side by side + the pitfalls case demo
      "hash-delete-race": { use: "hash-delete-race", width: 1000 },
      "probe-delete-pitfalls": { use: "probe-delete-pitfalls", width: 1000 },
      // Part 5: the probe family on one all-collide stream
      "probe-race": { use: "probe-race", width: 1000 },
      // 2→2, 8→8, 14→3, 20→9; try inserting 25: home 3 is taken → probes to 4
      "hash-probe": {
        title: "probing table (M = 11, fixed)",
        make: () => new LinearProbing(11, { resizeAt: Infinity }),
        initial: "2..20:6",
        buildStep: (s, k) => s.insert(k),
        renderer: arr,
        stateMsg: (s) => `M = ${s.M}, h(k) = k mod ${s.M} — ${s.n} keys, no lists: colliders probe forward`,
        info: openAddressingInfo("fixed M — a full table rejects inserts"),
        ops: [
          { name: "Insert", arg: "number", desc: "hash to the home slot, probe forward past collisions, place in the first empty slot (fixed M — a full table rejects)", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", desc: "probe forward from the home slot until the key or an empty slot", run: (s, v) => s.search(v) },
        ],
        costs: probeCosts, chrome: { showCosts: true },
        width: 1000, height: 150,
      },
      // the cluster from the slides: 14,25,36 differ by 11 → all home to 3 → occupy 3,4,5
      "hash-delete": {
        title: "probing table (M = 11, fixed)",
        make: () => new LinearProbing(11, { resizeAt: Infinity }),
        initial: "14..36:11",
        buildStep: (s, k) => s.insert(k),
        renderer: arr,
        stateMsg: (s) => `the cluster from the slides: 14, 25, 36 all home to slot 3 — now Delete 14`,
        info: openAddressingInfo("fixed M · delete = Sedgewick cluster re-insert"),
        defaultOp: "Delete", // this demo exists to illustrate delete — open ready to do it
        scripts: [{ name: "delete 14, then prove 25 survives", text: "delete 14\nsearch 25" }],
        ops: [
          { name: "Insert", arg: "number", desc: "probe forward from the home slot, place in the first empty slot", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", desc: "probe forward until the key or an empty slot", run: (s, v) => s.search(v) },
          { name: "Delete", arg: "number", desc: "empty the slot, then re-insert the rest of the cluster so no probe path breaks (Sedgewick)", run: (s, v) => s.remove(v) },
        ],
        costs: probeCosts, chrome: { showCosts: true },
        width: 1000, height: 150,
      },
      // 6→6, 10→2, 14→6 (probes to 7) at M=8, α = 0.375; one more insert
      // crosses 0.5 → double + rehash, and the 6/14 collision dissolves
      "hash-resize": {
        title: "probing table (resizes at α = ½)",
        make: () => new LinearProbing(8),
        initial: "6..14:4",
        buildStep: (s, k) => s.insert(k),
        renderer: arr,
        stateMsg: (s) => `M = ${s.M}, ${s.n} keys — α = ${(s.n / s.M).toFixed(2)}; one more insert crosses ½`,
        info: openAddressingInfo("doubles at α ≥ 0.5"),
        ops: [
          { name: "Insert", arg: "number", desc: "insert; crossing α = ½ DOUBLES the table and rehashes every key", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", desc: "probe forward until the key or an empty slot", run: (s, v) => s.search(v) },
        ],
        costs: probeCosts, chrome: { showCosts: true },
        width: 1000, height: 150,
      },
    });

    // Static state-stack: the double-hashing worked example (replaces the
    // ASCII block that never showed the last two table states). Mounted on
    // Reveal-ready, like initDeckDemos wires the demo slots.
    const mountWorked = () => {
      const el = document.getElementById("double-worked");
      if (!el || el.__mounted) return;
      el.__mounted = true;
      renderStateStack(el, {
        make: () => new OpenAddressing(11, { probe: "double", q: 7, resizeAt: Infinity }),
        steps: [
          { run: (s) => s.insert(89), caption: "insert 89 · h(89) = 1 → slot 1" },
          { run: (s) => s.insert(18), caption: "insert 18 · h(18) = 7 → slot 7" },
          { run: (s) => s.insert(40), caption: "insert 40 · h(40) = 7 taken · h2(40) = 7−5 = 2 · (7+2) mod 11 → slot 9" },
          { run: (s) => s.insert(29), caption: "insert 29 · h(29) = 7 taken · h2(29) = 7−1 = 6 · (7+6) mod 11 → slot 2" },
        ],
      });
    };
    if (window.Reveal && Reveal.isReady && Reveal.isReady()) mountWorked();
    else if (window.Reveal) Reveal.on("ready", mountWorked);
    else document.addEventListener("DOMContentLoaded", mountWorked);
  </script>
</body>
</html>
