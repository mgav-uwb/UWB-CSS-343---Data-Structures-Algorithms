  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Presenter companion: press N for a synced notes tab (see lib/presenter.js) -->
  <script src="../../lib/presenter.js"></script>
  <!-- Grid review: press G for a zoomable, linearized grid of all slides -->
  <script src="../../lib/grid-review.js"></script>
  <!-- Unified library — hashing lecture demos via the bridge. ONE engine per
       scheme; each slide's spec exposes only the operations the lecture has
       introduced by that point:
         hash-chain  (Part 3)  separate chaining — Insert/Search/Delete on the
                               ChainRenderer (chains hang below the buckets)
         hash-probe  (Part 4)  linear probing — Insert/Search, FIXED size
                               (resizeAt: Infinity; a full table refuses keys)
         hash-delete (Part 4)  linear probing — adds Delete (Sedgewick's
                               cluster re-insert), still fixed size
         hash-resize (Part 5)  linear probing — Insert with the 0.5 threshold
                               live: cross it and watch the double + rehash -->
  <script type="module">
    import { initDeckDemos, LinearProbing, SeparateChaining, ArrayRenderer, ChainRenderer } from "../../lib/deck.js";
    const arr = (c) => new ArrayRenderer(c, { mode: "cells" });
    const probeCosts = ["hash", "compare", "write"];
    initDeckDemos({
      // the odd numbers 1..21 into M=7: step 2 is coprime to 7, so the keys
      // cycle through every bucket, then wrap and pair up — four 2-chains,
      // three 1-chains, α = 11/7 (matches the your-turn slide's table)
      "hash-chain": {
        title: "chaining table (M = 7)",
        make: () => new SeparateChaining(7),
        initial: "1..21:2",
        buildStep: (s, k) => s.insert(k),
        renderer: (c) => new ChainRenderer(c),
        stateMsg: (s) => `M = 7, h(k) = k mod 7 — ${s.n} keys, α = ${s.alpha()}`,
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", run: (s, v) => s.search(v) },
          { name: "Delete", arg: "number", run: (s, v) => s.remove(v) },
        ],
        costs: ["hash", "compare"], chrome: { showCosts: true },
        width: 1000, height: 240,
      },
      // 2→2, 8→8, 14→3, 20→9; try inserting 25: home 3 is taken → probes to 4
      "hash-probe": {
        title: "probing table (M = 11, fixed)",
        make: () => new LinearProbing(11, { resizeAt: Infinity }),
        initial: "2..20:6",
        buildStep: (s, k) => s.insert(k),
        renderer: arr,
        stateMsg: (s) => `M = ${s.M}, h(k) = k mod ${s.M} — ${s.n} keys, no lists: colliders probe forward`,
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", run: (s, v) => s.search(v) },
        ],
        costs: probeCosts, chrome: { showCosts: true },
        width: 1000, height: 150,
      },
      // the cluster from the slides: 14,25,36 differ by 11 → all home to 3 → occupy 3,4,5
      "hash-delete": {
        title: "probing table (M = 11, fixed)",
        make: () => new LinearProbing(11, { resizeAt: Infinity }),
        initial: "14..36:11",
        buildStep: (s, k) => s.insert(k),
        renderer: arr,
        stateMsg: (s) => `the cluster from the slides: 14, 25, 36 all home to slot 3 — now Delete 14`,
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", run: (s, v) => s.search(v) },
          { name: "Delete", arg: "number", run: (s, v) => s.remove(v) },
        ],
        costs: probeCosts, chrome: { showCosts: true },
        width: 1000, height: 150,
      },
      // 6→6, 10→2, 14→6 (probes to 7) at M=8, α = 0.375; one more insert
      // crosses 0.5 → double + rehash, and the 6/14 collision dissolves
      "hash-resize": {
        title: "probing table (resizes at α = ½)",
        make: () => new LinearProbing(8),
        initial: "6..14:4",
        buildStep: (s, k) => s.insert(k),
        renderer: arr,
        stateMsg: (s) => `M = ${s.M}, ${s.n} keys — α = ${(s.n / s.M).toFixed(2)}; one more insert crosses ½`,
        ops: [
          { name: "Insert", arg: "number", run: (s, v) => s.insert(v) },
          { name: "Search", arg: "number", run: (s, v) => s.search(v) },
        ],
        costs: probeCosts, chrome: { showCosts: true },
        width: 1000, height: 150,
      },
    });
  </script>
</body>
