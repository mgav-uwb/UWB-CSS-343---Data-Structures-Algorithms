  <!-- Unified library — ONE Graph engine (fixed vertices 0–7, editable edge
       list "u v, u v, …"); each slide's spec exposes only the operations the
       lecture has introduced by that point:
         graph-tour (Part 1)  static picture of tonight's DAG (no ops)
         graph-dfs  (Part 2)  DFS from any start (tree edges, backtracking,
                              back-edge = cycle detection)
         graph-bfs  (Part 3)  adds BFS — run both from the same start and
                              compare orders; BFS labels = fewest-edge distances
         graph-topo (Part 4)  adds Topo sort (Kahn) — add edge 6 2 to close a
                              cycle: Kahn strands red vertices, DFS flags the
                              back edge -->
  <script type="module">
    import { initDeckDemos, ArrayRenderer, Graph, GraphRenderer } from "../../lib/deck.js";
    const DAG = "0 1, 0 3, 1 2, 1 3, 2 3, 0 5, 3 4, 3 7, 4 5, 5 6, 4 7"; // the canonical course graph (circular layout; same edges S09/S11 weight)
    const base = () => ({
      make: () => new Graph({ layout: "circle" }),
      initial: DAG,
      initialPlaceholder: "u v, u v, …",
      initialTitle: "directed edge pairs \"u v\", comma-separated",
      valPlaceholder: "start vertex",
      buildAll: (s, keys) => s.buildTrace(keys),   // Build animates the edges landing one at a time
      renderer: (c) => new GraphRenderer(c, { directed: true }),
      stateMsg: (g) => `directed graph — ${g.inorder()}; pairs "u v" in the box are the edges`,
      costs: ["visit", "compare"], chrome: { showCosts: true },
      width: 960, height: 240,
    });
    // frontier row: the container that MAKES the search breadth- or depth-first
    const frontierView = (inner) => ({ draw: (snap) => inner.draw(snap?.frontier?.items ?? [], {}) });
    const dual = (h) => ({
      renderer: [
        (c) => new GraphRenderer(c, { directed: true }),
        (c) => frontierView(new ArrayRenderer(c, { mode: "cells", pointers: false })),
      ],
      labels: ["", "the frontier — BFS: the queue · DFS: the recursion stack · topo: the ready set"],
      height: [h, 48],
    });
    const dfsOp = { name: "DFS from", arg: "number", run: (s, v) => s.dfs(v) };
    const bfsOp = { name: "BFS from", arg: "number", run: (s, v) => s.bfs(v) };
    initDeckDemos({
      "graph-tour": { // static view of tonight's DAG for Part 1 (no ops yet)
        make: () => { const g = new Graph({ layout: "circle" }); g.build(); return g; },
        renderer: (c) => new GraphRenderer(c, { directed: true }),
        label: "tonight's graph — a DAG on 8 vertices, 10 directed edges",
        width: 900, height: 230,
      },
      "graph-dfs":  { ...base(), ...dual(195), ops: [dfsOp] },
      "graph-bfs":  { ...base(), ...dual(195), ops: [dfsOp, bfsOp] },
      "graph-topo": { ...base(), ...dual(175), ops: [dfsOp, bfsOp, { name: "Topo sort", run: (s) => s.topo() }] },
    });
  </script>
