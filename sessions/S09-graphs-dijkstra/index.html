    .reveal h3 { color: var(--accent); }

<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="L09-graphs-dijkstra.md"
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:">

  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <script type="module">
    import { initDeckDemos, WeightedGraph, GraphRenderer } from "../../lib/deck.js";
    // build() installs the fixed weighted digraph and ignores input → build it here in make()
    initDeckDemos({
      // the slide's 4-relaxation trace: 0→1(2), 0→2(5) discover; 1→3(1) improves; 2→3(8) fails (13 ≥ 3)
      "relax": {
        make: () => {
          const g = new WeightedGraph();
          g.nodes = [{ id: 0, x: 0.10, y: 0.50 }, { id: 1, x: 0.45, y: 0.15 },
                     { id: 2, x: 0.45, y: 0.85 }, { id: 3, x: 0.85, y: 0.50 }];
          g.edges = [{ u: 0, v: 1, w: 2, directed: true }, { u: 0, v: 2, w: 5, directed: true },
                     { u: 1, v: 3, w: 1, directed: true }, { u: 2, v: 3, w: 8, directed: true }];
          g.adj = { 0: [{ v: 1, w: 2 }, { v: 2, w: 5 }], 1: [{ v: 3, w: 1 }], 2: [{ v: 3, w: 8 }], 3: [] };
          return g;
        },
        renderer: (c) => new GraphRenderer(c, { directed: true }),
        run: (s) => s.dijkstra(0),                 // its trace IS the 4 relaxations, in settle order
        costs: ["visit", "compare"], chrome: { showCosts: true }, width: 800, height: 230,
      },
      "dijkstra": {
        make: () => { const g = new WeightedGraph(); g.build(); return g; },
        renderer: (c) => new GraphRenderer(c, { directed: true }),
        run: (s) => s.dijkstra(0),                 // settle nearest, relax out-edges
        costs: ["visit", "compare"], chrome: { showCosts: true }, width: 800, height: 250,
      },
    });
  </script>
</body>
