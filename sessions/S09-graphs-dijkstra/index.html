  <!-- Unified library — ONE WeightedGraph engine (fixed vertices 0–7, editable
       weighted edge list "u v w, u v w, …"); each slide's spec exposes only
       what the lecture has introduced by that point:
         wgraph-tour  (Part 1)  static picture of tonight's weighted digraph
         relax        (Part 2)  scripted 4-relaxation mini trace (one concept)
         dijkstra     (Part 3)  Dijkstra from any start; Build animates
         dijkstra-neg (Part 4)  same engine — append "7 1 -20" and the final
                                edge re-check flags the broken label in red -->
  <script type="module">
    import { initDeckDemos, WeightedGraph, GraphRenderer } from "../../lib/deck.js";
    const WDAG = "0 1 4, 0 3 6, 1 2 1, 1 3 5, 2 3 8, 0 5 20, 3 4 2, 3 7 11, 4 5 3, 5 6 9, 4 7 7";   // the canonical course graph, weighted (circular layout)
    const base = () => ({
      make: () => new WeightedGraph({ layout: "circle" }),
      initial: WDAG,
      initialPlaceholder: "u v w, …",
      initialTitle: "weighted directed edge triples \"u v w\", comma-separated",
      valPlaceholder: "start vertex",
      buildAll: (s, keys) => s.buildTrace(keys),   // Build animates the edges landing one at a time
      renderer: (c) => new GraphRenderer(c, { directed: true }),
      stateMsg: (g) => `weighted digraph — ${g.inorder()}; triples "u v w" in the box are the edges`,
      ops: [{ name: "Dijkstra from", arg: "number", run: (s, v) => s.dijkstra(v) }],
      costs: ["visit", "compare"], chrome: { showCosts: true },
      width: 960, height: 235,
    });
    initDeckDemos({
      "wgraph-tour": { // static view of tonight's weighted digraph for Part 1 (no ops yet)
        make: () => { const g = new WeightedGraph({ layout: "circle" }); g.build(); return g; },
        renderer: (c) => new GraphRenderer(c, { directed: true }),
        label: "tonight's graph — 8 vertices, 11 weighted directed edges",
        width: 900, height: 225,
      },
      // the slide's 4-relaxation trace: 0→1(2), 0→2(5) discover; 1→3(1) improves; 2→3(8) fails (13 ≥ 3)
      "relax": {
        make: () => {
          const g = new WeightedGraph();
          g.nodes = [{ id: 0, x: 0.10, y: 0.50 }, { id: 1, x: 0.45, y: 0.15 },
                     { id: 2, x: 0.45, y: 0.85 }, { id: 3, x: 0.85, y: 0.50 }];
          g.edges = [{ u: 0, v: 1, w: 2, directed: true }, { u: 0, v: 2, w: 5, directed: true },
                     { u: 1, v: 3, w: 1, directed: true }, { u: 2, v: 3, w: 8, directed: true }];
          g.adj = { 0: [{ v: 1, w: 2 }, { v: 2, w: 5 }], 1: [{ v: 3, w: 1 }], 2: [{ v: 3, w: 8 }], 3: [] };
          return g;
        },
        renderer: (c) => new GraphRenderer(c, { directed: true }),
        run: (s) => s.dijkstra(0),                 // its trace IS the 4 relaxations, in settle order
        costs: ["visit", "compare"], chrome: { showCosts: true }, width: 800, height: 230,
      },
      "dijkstra": base(),
      "dijkstra-neg": base(),
    });
  </script>
