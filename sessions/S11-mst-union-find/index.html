  <!-- Unified library — stage-scoped interactive demos:
         union-find (Part 1)  weighted quick-union + path compression on an
                              editable element count; Union/Connected/Find ops
         mst-tour   (Part 2)  static picture of tonight's UNDIRECTED weighted
                              graph (same 8 vertices as L09, arrows dropped)
         kruskal    (Part 3)  Kruskal on an editable "u v w" edge list
         prim       (Part 4)  adds Prim from any start + Dijkstra for the
                              MST-vs-SPT contrast (triangle "0 1 2, 1 2 2,
                              0 2 3": Prim keeps 1-2, Dijkstra keeps 0-2) -->
  <script type="module">
    import { initDeckDemos, UnionFind, ArrayRenderer, WeightedGraph, GraphRenderer, ForestRenderer } from "../../lib/deck.js";
    const WMST = "0 1 4, 0 2 2, 2 1 1, 1 3 5, 2 3 8, 2 4 10, 3 4 2, 3 5 6, 4 5 3, 5 6 1, 4 7 7";
    const mst = () => ({
      make: () => new WeightedGraph({ directed: false }),
      initial: WMST,
      initialPlaceholder: "u v w, …",
      initialTitle: "weighted edge triples \"u v w\", comma-separated",
      buildAll: (s, keys) => s.buildTrace(keys),   // Build animates the edges landing one at a time
      renderer: (c) => new GraphRenderer(c, { directed: false }),
      stateMsg: (g) => `undirected weighted graph — ${g.inorder()}; triples "u v w" in the box are the edges`,
      costs: ["compare", "visit"], chrome: { showCosts: true },
      width: 960, height: 230,
    });
    initDeckDemos({
      "union-find": {
        make: () => new UnionFind(),
        initial: "10", loadRaw: true,              // Build = n fresh singletons (intentionally instant)
        initialWidth: 50, initialPlaceholder: "n",
        initialTitle: "how many elements — Build creates n singleton sets",
        valPlaceholder: "p q  (e.g. 3 7)", valInitial: "3 7",
        // the gallery's dual view: the FOREST that parent[] encodes (top) plus
        // the raw array (bottom) — one trace drives both
        renderer: [
          (c) => new ForestRenderer(c, { R: 13, rowH: 42 }),
          (c) => new ArrayRenderer(c, { mode: "cells", pointers: false }),
        ],
        labels: ["the forest — each set is a tree, its root is the set's name",
                 "parent[] — cell i holds parent[i]; parent[i] = i marks a root"],
        stateMsg: (s) => `${s.inorder()} — flat forest: every element its own root until you Union (a PAIR, e.g. 3 7)`,
        ops: [
          { name: "Union", arg: "pair", run: (s, v) => s.union(v[0], v[1]) },
          { name: "Connected", arg: "pair", run: (s, v) => s.connected(v[0], v[1]) },
          { name: "Find", arg: "number", run: (s, v) => s.find(v) },
        ],
        costs: ["read", "write", "compare"], chrome: { showCosts: true },
        width: 960, height: [128, 52],
      },
      "mst-tour": { // static view of tonight's undirected graph for Part 2
        make: () => { const g = new WeightedGraph({ directed: false }); g.build(); return g; },
        renderer: (c) => new GraphRenderer(c, { directed: false }),
        label: "tonight's graph — the L09 graph, now undirected: 8 vertices, 11 weighted edges",
        width: 900, height: 225,
      },
      "kruskal": { ...mst(),
        renderer: [
          (c) => new GraphRenderer(c, { directed: false }),
          (c) => { const r = new ForestRenderer(c, { R: 12, rowH: 40 }); return { draw: (snap) => r.draw(snap?.uf ?? [], {}) }; },
        ],
        labels: ["", "the union-find forest — same root ⇒ the edge would close a cycle ⇒ skip"],
        height: [185, 120],
        ops: [{ name: "Kruskal", run: (s) => s.kruskal() }] },
      "prim": { ...mst(), height: 210, valPlaceholder: "start vertex", ops: [
        { name: "Kruskal", run: (s) => s.kruskal() },
        { name: "Prim from", arg: "number", run: (s, v) => s.prim(v) },
        { name: "Dijkstra from", arg: "number", run: (s, v) => s.dijkstra(v) },
      ] },
    });
  </script>
