<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 343 · L13 — Advanced Sorting & Divide-and-Conquer</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="../../lib/core/lib.css">

  <style>
    :root { --accent: #7c5cff; }
    .reveal h2 { color: #2a2a3a; }
    .reveal h3 { color: var(--accent); }
    .reveal section small { color: #66708a; }
    .reveal table { font-size: 0.78em; }
    .reveal pre { width: 100%; box-shadow: none; font-size: 0.46em; }
    .reveal pre code { border-radius: 8px; }
    .reveal img { background: #fff; border: 1px solid #eef0f4; border-radius: 8px; }
    .reveal blockquote { width: 92%; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="L13-sorting-dc.md"
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Presenter companion: press N for a synced notes tab (see lib/presenter.js) -->
  <script src="../../lib/presenter.js"></script>
  <!-- Unified library — stage-scoped interactive demos. Build strings use the
       range syntax START..STOP[:STEP][:ORDER]; Build shows the raw array (the
       ops run the algorithms — the S06 loadRaw pattern):
         mergesort-merge     (P2)  Mergesort on an editable array
         quicksort-partition (P3)  adds Quicksort — compare counters vs
                                   Mergesort on the same input; Build "1..12"
                                   (already sorted) = the Θ(n²) pivot trap
         quickselect         (P4)  adds Select rank k (one-sided recursion) -->
  <script type="module">
    import { initDeckDemos, Sorting, ArrayRenderer } from "../../lib/deck.js";
    const base = () => ({
      make: () => new Sorting(),
      initial: "1..12:1:RAND", loadRaw: true,     // Build = show the raw array; ops sort it
      renderer: (c) => new ArrayRenderer(c, { mode: "cells" }),
      stateMsg: (s) => `array of ${s.a.length} — pick an algorithm (Build reloads the raw array)`,
      costs: ["compare", "swap", "write"], chrome: { showCosts: true },
      width: 900, height: 150,
    });
    // aux row adapter: draw the frame's scratch buffer with its own highlights
    const auxView = (inner) => ({ draw: (snap, hl) => inner.draw(snap?.aux ?? [], (hl && hl.aux) || {}) });
    const mergeOp = { name: "Mergesort", run: (s) => s.mergesort() };
    const quickOp = { name: "Quicksort", run: (s) => s.quicksort() };
    initDeckDemos({
      "mergesort-merge":     { ...base(), ops: [mergeOp],
        renderer: [
          (c) => new ArrayRenderer(c, { mode: "cells" }),
          (c) => auxView(new ArrayRenderer(c, { mode: "cells" })),
        ],
        labels: ["a[]", "aux — the Θ(n) buffer each merge copies into"],
        height: [105, 85] },
      "quicksort-partition": { ...base(), ops: [mergeOp, quickOp] },
      "quickselect":         { ...base(), ops: [mergeOp, quickOp,
        { name: "Select rank", arg: "number", run: (s, v) => s.quickselect(v) }] },
    });
  </script>
</body>
</html>
