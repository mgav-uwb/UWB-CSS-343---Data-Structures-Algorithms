<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 343 · L14 — Dynamic Programming I</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="../../lib/core/lib.css">

  <style>
    :root { --accent: #7c5cff; }
    .reveal h2 { color: #2a2a3a; }
    .reveal h3 { color: var(--accent); }
    .reveal section small { color: #66708a; }
    .reveal table { font-size: 0.78em; }
    .reveal pre { width: 100%; box-shadow: none; font-size: 0.46em; }
    .reveal pre code { border-radius: 8px; }
    .reveal img { background: #fff; border: 1px solid #eef0f4; border-radius: 8px; }
    .reveal blockquote { width: 92%; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="L14-dp-i.md"
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Unified library — interactive DP demos:
         fib-race (P2)  naive vs memoized vs 2-variable fib n (clamped 2..16),
                        one basic step per tick in LOCKSTEP (speed select) —
                        the linear versions finish and freeze (2-var: n adds,
                        memo: 2n−1 calls) while naive crawls toward
                        2·fib(n+1)−1; ⏩ 1024× sweeps the exponential tail
         lcs      (P3)  LCS of any two words (type "SUNDAY SATURDAY" in the
                        value box) — table fill + traceback -->
  <script type="module">
    import { initDeckDemos, DP, MatrixRenderer } from "../../lib/deck.js";
    const clampN = (v) => Math.max(2, Math.min(16, Math.trunc(v) || 10)); // all racers must solve the SAME n
    initDeckDemos({
      "fib-race": {
        stacked: true, columns: "3.2fr 1fr", // naive spans the top row; memo + 2-var share the second
        panels: [
          { title: "naive (no memo)", make: () => new DP(), renderer: (c) => new MatrixRenderer(c, {}),
            op: (s, v) => s.fibNaive(clampN(v)), width: 900, height: 130, fullRow: true,
            stat: (s, f) => `${f.counters["call"] || 0} calls · ${f.counters["recompute"] || 0} recomputes` },
          { title: "memoized", make: () => new DP(), renderer: (c) => new MatrixRenderer(c, {}),
            op: (s, v) => s.fib(clampN(v)), width: 660, height: 90,
            stat: (s, f) => `${f.counters["call"] || 0} calls · ${f.counters["cache-hit"] || 0} cache hits` },
          { title: "2 vars", make: () => new DP(), renderer: (c) => new MatrixRenderer(c, {}),
            op: (s, v) => s.fibTwoVar(clampN(v)), width: 200, height: 90,
            stat: (s, f) => `${f.counters["add"] || 0} adds · 2 cells` },
        ],
        opLabel: "Race fib", valLabel: "n (2–16)", placeholder: "10", initialValue: 10,
        speed: 300, speedControl: true, finishButton: true,
      },
      "lcs": {
        make: () => new DP(),
        noBuild: true,
        renderer: (c) => new MatrixRenderer(c, {}),
        // named, pre-filled word boxes (the gallery pattern): the instance
        // stays visible while the table animates, and Run works on first click
        stateMsg: () => 'ready: LCS("SUNDAY", "SATURDAY") — edit the words, press LCS',
        inputs: [
          { key: "a", label: "a", value: "SUNDAY", width: 95 },
          { key: "b", label: "b", value: "SATURDAY", width: 95 },
        ],
        ops: [{ name: "LCS", run: (s, _v, vals) => {
          const word = (t, d) => (String(t ?? "").trim().toUpperCase().replace(/[^A-Z]/g, "").slice(0, 12) || d);
          return s.lcs(word(vals.a, "SUNDAY"), word(vals.b, "SATURDAY"));
        } }],
        costs: ["compare", "write"], chrome: { showCosts: true }, width: 560, height: 140,
      },
    });
  </script>
</body>
</html>
