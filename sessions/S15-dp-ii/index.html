<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 343 · L15 — Dynamic Programming II</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="../../lib/core/lib.css">

  <style>
    :root { --accent: #7c5cff; }
    .reveal h2 { color: #2a2a3a; }
    .reveal h3 { color: var(--accent); }
    .reveal section small { color: #66708a; }
    .reveal table { font-size: 0.78em; }
    .reveal pre { width: 100%; box-shadow: none; font-size: 0.46em; }
    .reveal pre code { border-radius: 8px; }
    .reveal img { background: #fff; border: 1px solid #eef0f4; border-radius: 8px; }
    .reveal blockquote { width: 92%; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="L15-dp-ii.md"
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Unified library — interactive DP-table demos:
         knapsack      (P1)  items A 3/2, B 4/3, C 5/4, D 6/5; type a capacity
                             W (1..12) and watch the optimal subset change
         edit-distance (P2)  type two words ("kitten sitting" is the classic)
                             — table fill + edit-script traceback -->
  <script type="module">
    import { initDeckDemos, DP, MatrixRenderer } from "../../lib/deck.js";
    const table = () => ({
      make: () => new DP(),
      renderer: (c) => new MatrixRenderer(c, {}),
      costs: ["compare", "write"], chrome: { showCosts: true }, width: 560, height: 150,
    });
    initDeckDemos({
      // named, pre-filled input boxes (the gallery pattern): the instance stays
      // visible while the table animates, and Run works on first click
      "knapsack": { ...table(),
        noBuild: true,
        stateMsg: () => "items A 3/2 · B 4/3 · C 5/4 · D 6/5 — set capacity W (1–12), press Knapsack",
        inputs: [{ key: "w", label: "W (1–12)", value: "5", width: 55 }],
        ops: [{ name: "Knapsack",
          run: (s, _v, vals) => s.knapsack(undefined, Math.max(1, Math.min(12, parseInt(vals.w, 10) || 5))) }],
      },
      "edit-distance": { ...table(), width: 620, height: 118,
        noBuild: true,
        stateMsg: () => 'ready: editDistance("kitten", "sitting") — edit the words, press Edit distance',
        inputs: [
          { key: "a", label: "a", value: "kitten", width: 90 },
          { key: "b", label: "b", value: "sitting", width: 90 },
        ],
        ops: [{ name: "Edit distance", run: (s, _v, vals) => {
          const word = (t, d) => (String(t ?? "").trim().toLowerCase().replace(/[^a-z]/g, "").slice(0, 12) || d);
          return s.editDistance(word(vals.a, "kitten"), word(vals.b, "sitting"));
        } }],
      },
    });
  </script>
</body>
</html>
