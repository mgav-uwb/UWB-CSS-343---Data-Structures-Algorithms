<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 343 · L16 — Strings: String Matching &amp; Tries</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="../../lib/core/lib.css">

  <style>
    :root { --accent: #7c5cff; }
    .reveal h2 { color: #2a2a3a; }
    .reveal h3 { color: var(--accent); }
    .reveal section small { color: #66708a; }
    .reveal table { font-size: 0.78em; }
    .reveal pre { width: 100%; box-shadow: none; font-size: 0.46em; }
    .reveal pre code { border-radius: 8px; }
    .reveal img { background: #fff; border: 1px solid #eef0f4; border-radius: 8px; }
    .reveal blockquote { width: 92%; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section
        data-markdown="L16-strings-tries.md"
        data-separator="^\r?\n---\r?\n$"
        data-separator-vertical="^\r?\n--\r?\n$"
        data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
  <script>
    Reveal.initialize({
      hash: true, slideNumber: "c/t", transition: "slide",
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes, RevealMath.KaTeX],
    });
  </script>
  <!-- Presenter companion: press N for a synced notes tab (see lib/presenter.js) -->
  <script src="../../lib/presenter.js"></script>
  <!-- Unified library — stage-scoped interactive demos:
         trie          (P1/P2)  starts with {she, sells, sea, shells, shell};
                                Insert / Search / Prefix ops take a word in the
                                value box (Prefix = keysWithPrefix walk)
         string-search (P4)     value box takes "TEXT PATTERN" (one word ⇒
                                pattern over the default text); run Brute
                                force, then KMP on the same pair and compare
                                the compare counters -->
  <script type="module">
    import { initDeckDemos, Trie, StringSearch, TrieRenderer, ArrayRenderer } from "../../lib/deck.js";
    import { expandRepeats } from "../../lib/core/sequence.js";
    const pair = (s, v) => {   // "TEXT PATTERN" | "PATTERN" → set text/pattern
      // A^11B shorthand works, like the gallery — the note's adversarial pair
      // is "A^11B A^3B" instead of typing twelve As
      const w = expandRepeats(String(v)).trim().toUpperCase().split(/\s+/);
      s.build(w.length >= 2 ? [w[0], w[1]] : ["", w[0]]);
    };
    initDeckDemos({
      "trie": {
        make: () => { const t = new Trie(); t.build([]); return t; },
        noBuild: true,
        valPlaceholder: "word",
        renderer: (c) => new TrieRenderer(c, { rowH: 44 }),
        stateMsg: (t) => `${t.inorder()} — type a word: Insert / Search / Prefix`,
        ops: [
          { name: "Insert", arg: "string", run: (s, v) => s.insert(String(v).trim().toLowerCase()) },
          { name: "Search", arg: "string", run: (s, v) => s.search(String(v).trim().toLowerCase()) },
          { name: "Prefix", arg: "string", run: (s, v) => s.prefix(String(v).trim().toLowerCase()) },
        ],
        costs: ["read", "compare"], chrome: { showCosts: true }, width: 840, height: 195,
      },
      "string-search": {
        make: () => { const s = new StringSearch(); s.build([]); return s; },
        noBuild: true,
        // second row: KMP's Θ(m) aux — the failure table (blank during brute force)
        renderer: [
          (c) => new ArrayRenderer(c, { mode: "cells" }),
          (c) => { const r = new ArrayRenderer(c, { mode: "cells", pointers: false }); return { draw: (snap) => r.draw(snap?.lps ?? [], {}) }; },
        ],
        labels: ["the text", "KMP's failure table (lps) — its Θ(m) aux; index = pattern position"],
        valPlaceholder: "TEXT PATTERN",
        stateMsg: (s) => `${s.inorder()} — type "TEXT PATTERN" (or just a pattern; A^11B expands), then pick an algorithm`,
        ops: [
          { name: "Brute force", arg: "string", run: (s, v) => { pair(s, v); return s.bruteForce(); } },
          { name: "KMP", arg: "string", run: (s, v) => { pair(s, v); return s.kmp(); } },
        ],
        costs: ["compare"], chrome: { showCosts: true }, width: 900, height: [105, 48],
      },
    });
  </script>
</body>
</html>
