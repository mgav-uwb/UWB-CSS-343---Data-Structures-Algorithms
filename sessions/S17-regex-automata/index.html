  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

    Reveal.initialize({

  <!-- Unified library — stage-scoped interactive demos:
         nfa-build (P3)  starts on A*B (the worked slide's machine, +2 states
                         for the implicit outer wrap); type any regex over
                         letters and ( ) | * and press Build to watch
                         Sedgewick's construction add the edges one by one
         nfa-sim   (P4)  starts on the built (A*B|AC)D; Match runs the
                         set-of-states simulation on a typed string
                         ("AAABD" ✓ left branch, "ACD" ✓ right, "AAD" ✗);
                         Build swaps in a different regex first -->
  <script type="module">
    import { initDeckDemos, NFA, GraphRenderer } from "../../lib/deck.js";
    const RE = "(A*B|AC)D";
    // sanitize a typed regex: letters + ( ) | * only, balanced parens, ≤ 9
    // chars (the wrapped machine stays readable at 12 states); else default
    const cleanRe = (v, dflt) => {
      const s = String(v ?? "").toUpperCase().replace(/[^A-Z()|*]/g, "").slice(0, 9);
      let bal = 0;
      for (const c of s) { if (c === "(") bal++; if (c === ")") bal--; if (bal < 0) return dflt; }
      return s.length && bal === 0 ? s : dflt;
    };
    const cleanText = (v) => String(v ?? "").toUpperCase().replace(/[^A-Z]/g, "").slice(0, 12);
    const graph = () => ({ renderer: (c) => new GraphRenderer(c, { directed: true }),
                           costs: ["visit", "compare", "link"], chrome: { showCosts: true }, width: 820, height: 250 });
    initDeckDemos({
      // P3 — Thompson/Sedgewick construction, edge by edge, of a typed regex.
      // NAMED regex box (the gallery pattern): the machine's source stays visible
      "nfa-build": {
        ...graph(),
        make: () => { const n = new NFA(); n.build("A*B"); return n; },
        noBuild: true,
        stateMsg: (s) => `${s.inorder()} — type a regex (letters, ( ) | * ) and press Build`,
        inputs: [{ key: "re", label: "regex", value: "A*B", placeholder: "A*B", width: 110 }],
        ops: [{ name: "Build", run: (s, _v, vals) => s.buildTraced(cleanRe(vals.re, "A*B")) }],
      },
      // P4 — set-of-states simulation. Named regex + text boxes: after a Match,
      // the regex the machine encodes is STILL on screen; editing the regex box
      // auto-rebuilds before the next Match
      "nfa-sim": {
        ...graph(),
        make: () => { const n = new NFA(); n.build(RE); return n; },
        noBuild: true,
        stateMsg: (s) => `${s.inorder()} — Match a string (try AAABD, ACD, AAD), or Build a new regex`,
        inputs: [
          { key: "re", label: "regex", value: RE, placeholder: RE, width: 110 },
          { key: "text", label: "text", value: "AAABD", placeholder: "AAABD", width: 100 },
        ],
        ops: [
          { name: "Match", run: (s, _v, vals) => {
              const re = cleanRe(vals.re, RE);
              if (s.source !== re) s.build(re);      // regex box changed → rebuild first
              return s.simulate(cleanText(vals.text));
            } },
          { name: "Build", ghost: true, run: (s, _v, vals) => s.buildTraced(cleanRe(vals.re, RE)) },
        ],
      },
    });
  </script>
